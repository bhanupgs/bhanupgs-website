<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agentic Orchestration Console — BhanuPGS AI</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --bg: #020617; 
      --surface: #0d1117;
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-orange: #ff6b35; 
      --nav-height: 80px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      max-width: 100%;
      overflow-x: hidden; 
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Custom Interaction Layer */
    .cursor { position: fixed; width: 10px; height: 10px; background: var(--accent-orange); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: transform 0.1s; mix-blend-mode: screen; }
    .cursor-ring { position: fixed; width: 42px; height: 42px; border: 1.5px solid rgba(255, 107, 53, 0.4); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: transform 0.2s ease; }

    /* Navigation */
    nav {
      position: fixed; top: 0; width: 100%; height: var(--nav-height); z-index: 1000;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 6%;
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; text-decoration: none; color: #fff; letter-spacing: -0.02em; }
    .nav-logo span { color: var(--accent-blue); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s ease; }
    .nav-links a:hover { color: var(--accent-orange); }

    /* Console Layout Wrapper */
    .console-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 6% 60px;
    }

    .back-link {
      align-self: flex-start;
      max-width: 850px;
      margin: 0 auto 2rem;
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--accent-orange); }

    /* Console UI Box */
    .console-card {
      width: 100%; max-width: 850px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 24px;
      padding: 2.5rem; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }
    .console-header { display: flex; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); display: inline-block; margin-right: 6px; }

    textarea {
      width: 100%; height: 200px; background: rgba(0,0,0,0.25); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; color: #fff; font-family: 'Inter', sans-serif;
      font-size: 0.95rem; resize: none; transition: 0.3s; line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: var(--accent-blue); }

    .btn-exec {
      margin-top: 1.8rem; width: 100%; background: #fff; color: #000;
      border: none; padding: 1.2rem; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-weight: 800; text-transform: uppercase;
      cursor: none; transition: 0.3s; letter-spacing: 0.05em;
    }
    .btn-exec:hover { background: var(--accent-orange); color: #fff; transform: translateY(-3px); }

    footer { width: 100%; padding: 4rem 6%; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
    .footer-mail { color: var(--accent-blue); font-weight: 800; text-decoration: none; font-size: 0.95rem; }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav>
    <a href="index.html" class="nav-logo">BhanuPGS<span> AI</span></a>
    <ul class="nav-links">
      <li><a href="orchestrator.html" style="color: #fff;">Orchestrator</a></li>
      <li><a href="index.html#roadmap">MVP Lifecycle</a></li>
      <li><a href="index.html#architecture">QE Architecture</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <main class="console-wrapper">
    <div style="width: 100%; max-width: 850px; text-align: left;">
      <a href="index.html" class="back-link">← Back to Hub</a>
    </div>

    <div class="console-card">
      <div class="console-header">
        <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        <div style="font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--text-muted); font-weight: 600;">INPUT_CONSOLE_V4.0</div>
      </div>
      <div style="text-align: left; font-weight: 700; font-size: 0.85rem; margin-bottom: 1.2rem; color: #fff;">Enterprise User Story Context</div>
      <textarea id="storyInput" placeholder="As a network engineer, I want to verify multi-cloud L3 traffic routing between AWS and GCP regions..."></textarea>
      <button class="btn-exec" id="runBtn">Execute Agentic Workflow</button>
    </div>
  </main>

  <footer>
    <div class="nav-logo" style="font-size: 1rem;">BhanuPGS<span> AI</span></div>
    <a href="mailto:gbhanu@bhanupgs.in" class="footer-mail">gbhanu@bhanupgs.in →</a>
  </footer>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    function animateCursor() {
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
      rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    const btn = document.getElementById('runBtn');
    btn.addEventListener('click', function() {
      if(!document.getElementById('storyInput').value) return;
      this.innerText = "Orchestrating Agents...";
      this.style.background = "#ff6b35";
      this.style.color = "#fff";
      setTimeout(() => {
        this.innerHTML = "Visual Gateway Pipeline Triggered";
        this.style.background = "#00e5a0";
      }, 2000);
    });

    document.querySelectorAll('a, button, textarea').forEach(el => {
      el.addEventListener('mouseenter', () => { ring.style.transform = 'translate(-50%, -50%) scale(1.4)'; ring.style.borderColor = 'rgba(255, 107, 53, 0.8)'; });
      el.addEventListener('mouseleave', () => { ring.style.transform = 'translate(-50%, -50%) scale(1)'; ring.style.borderColor = 'rgba(255, 107, 53, 0.4)'; });
    });
  </script>
</body>
</html>
